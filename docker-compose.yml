services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: siege
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d siege"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Override .env values with Docker-network hostnames.
      # These must always point to sibling service names, not localhost.
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/siege
      DISCORD_BOT_API_URL: http://bot:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      API_UPSTREAM: http://backend:8000
    depends_on:
      - backend

  # The bundled Discord bot sidecar. Included in the `bundled-bot` profile (full
  # stack with the bundled bot) and excluded from the `sidecar-external` profile
  # (backend + frontend + postgres only, for operators running an alternate sidecar).
  #
  # Discord singleton-token constraint: the bundled bot and an external sidecar
  # cannot share the same DISCORD_TOKEN — only one bot process may hold the token
  # at a time. Use the `sidecar-external` profile when substituting an alternate
  # sidecar to prevent the conflict. See bot/INTERFACE.md for the sidecar contract.
  bot:
    build: ./bot
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    profiles:
      - bundled-bot

volumes:
  postgres_data:

# ── Docker Compose profiles ───────────────────────────────────────────────────
#
# bundled-bot (default full-stack mode):
#   docker-compose --profile bundled-bot up
#   Starts: postgres, backend, frontend, bot
#   Use for: local dev with the bundled Discord bot sidecar.
#
# sidecar-external (alternate sidecar mode):
#   docker-compose --profile sidecar-external up
#   Starts: postgres, backend, frontend  (bot excluded)
#   Use for: local dev with an external Discord sidecar.
#   The external sidecar must expose the same HTTP API contract
#   as the bundled bot (see bot/INTERFACE.md) and must be started
#   separately. Set DISCORD_BOT_API_URL in .env to point at it.
#
# No profile (profileless services only):
#   docker-compose up
#   Starts: postgres, backend, frontend  (same as sidecar-external)
#   This is the default when no --profile flag is given.
#   Note: DISCORD_BOT_API_URL in .env must point at a running sidecar
#   for Discord features to work.
