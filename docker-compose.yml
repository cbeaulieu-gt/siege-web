services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: siege
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d siege"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Override .env values with Docker-network hostnames.
      # These must always point to sibling service names, not localhost.
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/siege
      DISCORD_BOT_API_URL: http://bot:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      API_UPSTREAM: http://backend:8000
    depends_on:
      - backend

  bot:
    build: ./bot
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres

volumes:
  postgres_data:
