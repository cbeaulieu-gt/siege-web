name: Deploy

# ── Triggers ───────────────────────────────────────────────────────────────────
#
# push to main          → CI tests + build images + deploy to dev only.
#
# push a v* tag         → deploy to prod only (no rebuild). The images were
#                         already built and pushed when the tagged commit was
#                         merged to main. github.sha on a tag-triggered run
#                         equals the commit the tag points at, so
#                         `siege-api:<sha>` resolves to the exact image that
#                         was validated in dev. Tag creation IS the human
#                         approval step — no GitHub environment gate needed.
#
# workflow_dispatch     → manual escape hatch. Choose dev or prod and,
#                         optionally, supply an explicit SHA tag to deploy.
#                         Leave image_tag blank to deploy the current HEAD SHA.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'SHA tag to deploy (leave blank to use HEAD sha)'
        required: false
        default: ''
        type: string

# ── Concurrency ────────────────────────────────────────────────────────────────
#
# Main-push runs share the group `deploy-main-pipeline`; a fast second commit
# cancels the in-progress run so the newer code takes over immediately.
#
# Tag-triggered runs get a unique group per tag (`deploy-tag-refs/tags/v1.2.3`)
# so two different tags never cancel each other — each prod deploy completes
# independently.
#
# workflow_dispatch runs each get a unique group (run_id) so manual re-runs
# are never cancelled by each other.

# ── Permissions ────────────────────────────────────────────────────────────────
#
# pull-requests: write is required because the reusable ci.yml workflow
# declares that permission (for its on-failure PR comment steps). GitHub
# constrains a called workflow's permissions to the caller's grant, so
# deploy.yml must include it even though the deploy pipeline itself never
# writes to pull requests (the comment steps in ci.yml are gated on
# github.event_name == 'pull_request' and will never fire here).

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: >-
    ${{
      github.ref_type == 'tag' && format('deploy-tag-{0}', github.ref) ||
      github.event_name == 'workflow_dispatch' && github.run_id ||
      'deploy-main-pipeline'
    }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:

# ── CI ─────────────────────────────────────────────────────────────────────────
#
# Run tests only on pushes to main (not on tag pushes or manual dispatches).
# The commit was already tested when it landed on main; tags just promote the
# pre-validated image. Infra CI runs as part of infra-deploy.yml — it is no
# longer needed here.

  run-ci:
    name: Run Tests
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci.yml

# ── Build ──────────────────────────────────────────────────────────────────────
#
# Three image builds run in parallel via matrix. Each leg logs into Azure
# using the dev environment's AZURE_CREDENTIALS (AcrPush is needed; the dev
# service principal works because ACR is shared across environments).
# `az acr login` authenticates Docker — no separate ACR_USERNAME/PASSWORD
# secrets are required.
#
# Images are tagged with the commit SHA only (no :latest). Immutable SHA tags
# are the foundation of the promotion model: the exact bytes built here are
# what gets deployed to dev and later promoted unchanged to prod via a v* tag.
#
# This job runs only on main-branch pushes (after CI passes). Tag-triggered
# and workflow_dispatch runs skip it because the image already exists in ACR.

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    needs: run-ci
    environment: dev

    strategy:
      fail-fast: true
      matrix:
        include:
          - service: siege-api
            context: ./backend
          - service: siege-frontend
            context: ./frontend
          - service: siege-bot
            context: ./bot

    steps:
      - name: Validate required variables
        run: |
          missing=()
          [[ -z "${{ vars.ACR_NAME }}" ]]          && missing+=("ACR_NAME")
          [[ -z "${{ vars.ACR_LOGIN_SERVER }}" ]]  && missing+=("ACR_LOGIN_SERVER")
          [[ -z "${{ vars.RESOURCE_GROUP }}" ]]    && missing+=("RESOURCE_GROUP")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub Actions environment variables:"
            printf '   - %s\n' "${missing[@]}"
            echo ""
            echo "Set these under: GitHub → Settings → Environments → dev → Variables"
            exit 1
          fi
          echo "✅ All required variables present"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Authenticate Docker to ACR via the Azure CLI — the service principal
      # in AZURE_CREDENTIALS needs AcrPush on the registry (or Contributor
      # on the resource group).
      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}
          docker build --build-arg GIT_SHA=${{ github.sha }} -t "${IMAGE}:${{ github.sha }}" ${{ matrix.context }}
          docker push "${IMAGE}:${{ github.sha }}"

# ── Deploy API (dev) ───────────────────────────────────────────────────────────
#
# Migrations run automatically inside the container via entrypoint.sh
# (alembic upgrade head → uvicorn). No separate migration job needed.
#
# vars.RESOURCE_GROUP is an environment-scoped variable (not a secret).
# GitHub resolves the correct value per environment automatically:
#   dev  → siege-rg-dev
#   prod → siege-rg-prod

  deploy-api-dev:
    name: Deploy API (dev)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-api-dev
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-api-dev
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-api:${{ github.sha }}

# ── Deploy frontend & bot (dev) ────────────────────────────────────────────────
#
# Frontend and bot deploy in parallel after the API is up. Migrations run
# inside the API container on startup — no separate migration step needed.

  deploy-frontend-dev:
    name: Deploy Frontend (dev)
    needs: deploy-api-dev
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-frontend-dev
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-frontend-dev
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-frontend:${{ github.sha }}

  deploy-bot-dev:
    name: Deploy Bot (dev)
    needs: deploy-api-dev
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-bot-dev
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-bot-dev
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-bot:${{ github.sha }}

# ── Deploy API (prod) ──────────────────────────────────────────────────────────
#
# Triggered by a v* tag push or a manual workflow_dispatch targeting prod.
# There is no dependency on any dev job — prod deploys run directly from the
# trigger without waiting for (or requiring) a preceding dev run.
#
# The image SHA is resolved as:
#   tag push          → github.sha   (the commit the tag points at; built
#                                     when that commit was merged to main)
#   workflow_dispatch → inputs.image_tag if supplied, otherwise github.sha
#
# Tag creation is the human approval step. The GitHub "prod" environment no
# longer needs a Required Reviewers gate.

  deploy-api-prod:
    name: Deploy API (prod)
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
      )
    environment: prod

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-api-prod
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-api-prod
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-api:${{ inputs.image_tag || github.sha }}

# ── Deploy frontend & bot (prod) ───────────────────────────────────────────────
#
# Frontend and bot deploy in parallel after the prod API is up.
# Migrations run inside the API container on startup via entrypoint.sh.

  deploy-frontend-prod:
    name: Deploy Frontend (prod)
    needs: deploy-api-prod
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
      )
    environment: prod

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-frontend-prod
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-frontend-prod
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-frontend:${{ inputs.image_tag || github.sha }}

  deploy-bot-prod:
    name: Deploy Bot (prod)
    needs: deploy-api-prod
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
      )
    environment: prod

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy siege-web-bot-prod
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: siege-web-bot-prod
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/siege-bot:${{ inputs.image_tag || github.sha }}
