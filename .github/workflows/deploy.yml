name: Deploy

on:
  push:
    branches:
      - main

env:
  ACR_NAME: siegeacr
  RESOURCE_GROUP: siege-rg

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/siege-api:${{ github.sha }} ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/siege-api:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/siege-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/siege-frontend:${{ github.sha }}

      - name: Build and push bot
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/siege-bot:${{ github.sha }} ./bot
          docker push ${{ env.ACR_NAME }}.azurecr.io/siege-bot:${{ github.sha }}

  deploy:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: siege-api
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/siege-api:${{ github.sha }}

      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: siege-frontend
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/siege-frontend:${{ github.sha }}

      - name: Deploy bot
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: siege-bot
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/siege-bot:${{ github.sha }}
