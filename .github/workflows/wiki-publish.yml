name: Publish wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki-publish.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push to wiki)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  publish:
    name: Mirror wiki/ to siege-web.wiki.git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6

      - name: Publish wiki/ to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@64efa0a9436db17670a2259e0ac249d6f08bb352 # v5
        with:
          path: wiki/
          token: ${{ github.token }}
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}
          ignore: |
            .DS_Store
            *.bak
