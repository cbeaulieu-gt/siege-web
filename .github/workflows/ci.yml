name: CI

on:
  pull_request:
    branches:
      - main
  workflow_call:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: false
        default: 'main'

# Cancel any in-progress CI run for the same branch when a new commit is pushed.
# group uses head_ref (PR source branch) for pull_request events so each PR gets
# its own group; falls back to run_id for workflow_call so reusable invocations
# from deploy.yml are never cancelled by each other.
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Least-privilege permissions. pull-requests: write is required for the
# on-failure comment steps that tag @claude on failing PRs.
# contents: write and actions: read are required by the claude-lint-fix
# reusable workflow (it pushes fix commits and reads workflow run logs).
permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  backend-ci:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
      DISCORD_BOT_API_URL: http://localhost:8001
      DISCORD_BOT_API_KEY: test-key
      DISCORD_GUILD_ID: "123456789"
      ENVIRONMENT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting with black
        run: black --check app/ tests/

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests with coverage
        run: pytest tests/ --cov=app


  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build


  # E2E (Playwright) tests are NOT run in CI automatically — they require a live
  # docker-compose stack. To run locally:
  #   docker-compose up -d
  #   cd frontend && npx playwright install --with-deps chromium
  #   npm run test:e2e
  #
  # To add a CI e2e job: provision a Postgres service container, start backend +
  # frontend in job steps, then run `npx playwright install` + `npm run test:e2e`.

  bot-ci:
    name: Bot Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    env:
      DISCORD_TOKEN: test-token
      DISCORD_GUILD_ID: "123456789"
      BOT_API_KEY: test-key
      ENVIRONMENT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v


  claude-lint-fix:
    name: Claude Lint Fix
    needs: [backend-ci, frontend-ci, bot-ci]
    if: failure() && github.event_name == 'pull_request'
    uses: cbeaulieu-gt/github-actions/.github/workflows/claude-lint-fix.yml@v1
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      gh_pat: ${{ secrets.GH_PAT }}
    with:
      pr_number: ${{ github.event.pull_request.number }}
      run_id: ${{ github.run_id }}
      auto_apply: false
